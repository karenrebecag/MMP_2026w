<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATOM Academy — Preview</title>

  <!-- Estilos del bundle local (dev) -->
  <link rel="stylesheet" href="/dist/landing.css" />

  <!-- GSAP global: simula lo que Webflow inyecta (Core + plugins activados en Project settings →
       GSAP). El bundle NO empaqueta GSAP (external en esbuild); lo consume vía window.gsap. Sin
       estos scripts, loadGsap() no encontraría GSAP en el preview. Mantener en sync con los plugins
       activados en Webflow: ScrollTrigger, SplitText, Draggable, Inertia, MorphSVG, CustomEase. -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/InertiaPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/MorphSVGPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/CustomEase.min.js"></script>

  <style>
    /* El DS usa --aa-font: inherit (adopta la fuente del host). En Elementor la toma
       del tema; aquí simulamos un host con una sans moderna para el preview. */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>

  <!-- Embed realista: un solo mount, igual que en Elementor.
       Las secciones declaran su propio strip (data-aa-section-theme). -->
  <div data-aa-mount data-aa-theme="light" data-aa-lang="es"></div>

  <!-- Bundle local (npm run dev) -->
  <script type="module" src="/dist/landing.js"></script>
</body>
</html>
